interface:
  display_name: "Image2 Wedding Portrait"
  short_description: "婚纱摄影写真提示词"
  default_prompt: "使用 $image2-wedding-portrait 生成婚纱摄影写真中文提示词；默认主体为“20岁出头的中国美人。”，默认表情为“自然的笑容。”，默认身材为“身材:人物拥有完美的身材。上围尺寸正常，腰也十分的纤细。”，默认尺寸为“3:4，照片分辨率8k”。婚纱衣着可由 AI 随机生成或由用户指定，衣着描述最后必须添加“女性穿着得体，衣着设计大方性感展现魅力。”。如果用户没有指定图片风格，先要求用户在 iPhone 手机直出拍摄质感与专业单反相机写真拍摄质感中二选一；如果用户指定其他风格，则使用用户填写风格生成。"
