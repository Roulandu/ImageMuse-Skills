interface:
  display_name: "Image2 Fashion Lookbook"
  short_description: "Adult garment-first lookbooks"
  default_prompt: "使用 $image2-fashion-lingerie-lookbook 生成默认模特为原创成年东方女性（20岁及以上）、以服装设计、版型和面料为重点的成人时尚 Lookbook 中文提示词，加入基础成人、自然端正姿态、默认正面或轻微三分之四侧身面向镜头、默认半身或 3/4 身照（除非用户明确要求全身照）、正视或轻微俯视 editorial 镜头、明亮室内；用户未明确服装时加入默认吊带睡裙服装锚点，用户明确指定安全服装时保留用户服装；除非用户自己写了其他安全体态描述，最终中文提示词必须原封不动包含：上半身身形丰腴，胸部轮廓自然饱满，整体身形纤细匀称，身体比例协调，腰肩线条自然，曲线流畅，整体凸显轻盈健康的女性体态。泳装意图必须追加高端泳装品牌 Lookbook 锚点。"
